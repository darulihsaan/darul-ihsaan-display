<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Darul Ihsaan — Live Fundraiser</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /*
    BANNER REMOVAL WRAPPER

    Google Apps Script web apps include a banner at the top.
    We push the iframe up by exactly the banner height so its
    bottom edge aligns with the viewport bottom.

    BANNER_HEIGHT tuning:
      The default Google banner is around 38-42px depending on
      browser zoom. If you see the top of the dashboard clipped,
      reduce this value. If you see a slice of the banner, increase it.
  */

  :root {
    --banner-height: 40px;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #061423;
  }

  .frame-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    /* Visible viewport — iframe will overflow above this */
    height: 100vh;
    overflow: hidden;
  }

  iframe {
    position: absolute;
    /* Push iframe UP so the banner sits above the visible area.
       The iframe is taller than the viewport by the banner height,
       so the dashboard content fills the visible area exactly. */
    top: calc(-1 * var(--banner-height));
    left: 0;
    width: 100%;
    height: calc(100% + var(--banner-height));
    border: 0;
    display: block;
    background: #061423;
  }
</style>
</head>
<body>

<div class="frame-wrapper">
  <!--
    Replace the src URL below with YOUR Apps Script web app URL.
    It should look like:
      https://script.google.com/macros/s/AKfycb.../exec
  -->
  <iframe
    src="https://script.google.com/macros/s/AKfycbzmg9Q50mYjXH5XZD_Pbl4eO4N6fKSwRLbXCl8ao1EvjjrCiMdpzMyOQJYNHP-2UdjdnQ/exec"
    allow="autoplay"
    title="Darul Ihsaan Live Fundraiser">
  </iframe>
</div>

</body>
</html>
